<svg width="600" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimal Premium Background -->
  <rect width="600" height="900" fill="#0A0A0A" rx="20"/>
  <rect x="10" y="10" width="580" height="880" fill="none" stroke="#2A2A2A" stroke-width="2" rx="10"/>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="600" height="900" fill="url(#grid)" rx="20"/>

  <!-- QR Placeholder -->
  <rect x="200" y="200" width="200" height="200" fill="#ffffff" rx="10"/>
  <rect x="220" y="220" width="160" height="160" fill="none" stroke="#000000" stroke-width="8" stroke-dasharray="20,10"/>
  
  <text x="300" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#000000" text-anchor="middle">SCAN ME</text>

  <!-- Info -->
  <text x="300" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="2">TECHSPACE.SRMUNIVERSITY.AC.IN</text>
  
  <rect x="150" y="600" width="300" height="2" fill="#2A2A2A"/>

  <text x="300" y="660" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#888888" text-anchor="middle">@TECHSPACE.SRMUH</text>

  <!-- Tagline -->
  <text x="300" y="800" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="4">INNOVATE. BUILD. LEAD.</text>
</svg>
